[global]
   # Basic setup
   workgroup = WORKGROUP
   server string = Low Latency Samba Server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

   # Low Latency Tuning
   socket options = TCP_NODELAY IPTOS_LOWDELAY SO_RCVBUF=131072 SO_SNDBUF=131072
   use sendfile = yes
   min receivefile size = 16384
   aio read size = 16384
   aio write size = 16384
   strict locking = no
   read raw = yes
   write raw = yes
   
   # Disable security features that add latency
   smb encrypt = disabled
   server signing = no

[FastShare]
   path = /srv/samba/fastshare
   read only = no
   guest ok = yes
   force user = nobody
   # Optimization for the specific share
   strict allocate = no
   sync always = no

